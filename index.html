<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Sign-up Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="hero">
        <div class="hero-left">
            <img src="images/hero-image.jpg" alt="Green leaves background image">
            <div class="logo">
                <img src="images/odin-lined.png" alt="Odin project logo">
                <p>ODIN</p>
                <p>Photo by <a href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a></p>
            </div>
        </div>

        <div class="hero-right">
            <div class="intro">

            </div>
            <form method="get">
                <h1>Let's do this!</h1>

                <fieldset>
                    <label for="first-name">First name</label>
                    <input type="text" id="first-name" name="first-name">

                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" name="last-name">
                </fieldset>

                <fieldset>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">

                    <label for="phone">Phone number</label>
                    <input type="tel" id="phone" name="phone">
                </fieldset>
                
                <fieldset>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password">

                    <label for="repeat-password">Confirm password</label>
                    <input type="password" id="confirm-password" name="confirm-password">
                </fieldset>

                <button type="submit">Create Account</button>
                <div>
                    <p>Already have an account?</p>
                    <a href="#">Log in</a>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
